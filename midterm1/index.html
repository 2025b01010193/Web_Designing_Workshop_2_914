<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd Checker</title>
</head>
<body>

    <h2>Check Even or Odd</h2>

    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="checkNumber()">Check</button>

    <p id="result"></p>
    <p id="numbers"></p>

    <script>
        function checkNumber() {
            let n = document.getElementById("num").value;
            let result = "";
            let series = "";

           //for checking even odd
            if (n % 2 == 0) {
                result = "Even Number";
            } else {
                result = "Odd Number";
            }
            
            document.getElementById("result").innerHTML = result;

            // for printing till n
            for (let i = 1; i <= n; i++) {
                series += i + " ";
            }

            document.getElementById("numbers").innerHTML = "Numbers: " + series;
        }
    </script>

</body>
</html>
